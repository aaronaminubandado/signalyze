name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src/signalyze tests
      - name: Mypy
        run: mypy src/signalyze
      - name: Pytest
        run: pytest --cov=signalyze --cov-report=term-missing
